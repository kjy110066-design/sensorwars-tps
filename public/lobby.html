<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENSOR WARS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    color: #e0e8ff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 30px 0 40px;
  }

  /* 별빛 배경 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 30%, rgba(100,180,255,.6) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 70%, rgba(100,180,255,.4) 0%, transparent 100%);
    z-index: 0;
  }

  /* 그리드 오버레이 */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,100,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,100,255,.04) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    width: 800px; max-width: 95vw;
    display: flex; flex-direction: column; align-items: center; gap: 28px;
  }

  /* 타이틀 */
  .title-wrap { text-align: center; }

  .title-main {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    letter-spacing: .15em;
    background: linear-gradient(135deg, #00d4ff, #0066ff, #7700ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(0,180,255,.5));
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%,100% { filter: drop-shadow(0 0 20px rgba(0,180,255,.5)); }
    50%      { filter: drop-shadow(0 0 40px rgba(0,180,255,.9)); }
  }

  .title-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; letter-spacing: .4em;
    color: rgba(150,200,255,.6); margin-top: 4px;
    text-transform: uppercase;
  }

  /* 패널 공통 */
  .panel {
    width: 100%;
    background: rgba(5,15,40,.85);
    border: 1px solid rgba(0,120,255,.3);
    border-radius: 8px;
    padding: 20px 24px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,80,255,.1), inset 0 0 30px rgba(0,30,80,.3);
  }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: .72rem; letter-spacing: .25em;
    color: rgba(0,180,255,.7); margin-bottom: 14px;
    text-transform: uppercase; border-bottom: 1px solid rgba(0,100,255,.2);
    padding-bottom: 8px;
  }

  /* 서버 IP 입력 */
  .ip-row { display: flex; gap: 10px; align-items: center; }

  .ip-input {
    flex: 1; background: rgba(0,10,30,.8);
    border: 1px solid rgba(0,120,255,.4); border-radius: 4px;
    color: #80d0ff; font-family: 'Orbitron', monospace; font-size: 1rem;
    padding: 10px 14px; outline: none; transition: border-color .2s;
  }
  .ip-input:focus { border-color: rgba(0,180,255,.8); box-shadow: 0 0 15px rgba(0,150,255,.2); }
  .ip-input::placeholder { color: rgba(80,120,180,.5); }

  .btn-connect {
    background: linear-gradient(135deg, #0050cc, #0033aa);
    border: 1px solid rgba(0,150,255,.5);
    color: #80d0ff; font-family: 'Orbitron', monospace;
    font-size: .75rem; letter-spacing: .1em; padding: 10px 18px;
    border-radius: 4px; cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .btn-connect:hover { background: linear-gradient(135deg, #0066ff, #0044cc); box-shadow: 0 0 20px rgba(0,150,255,.4); }

  /* 플레이어 / 모드 선택 */
  .select-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .select-btn {
    flex: 1; min-width: 120px;
    background: rgba(0,20,60,.7);
    border: 2px solid rgba(0,100,200,.3); border-radius: 6px;
    color: rgba(150,200,255,.7); font-family: 'Orbitron', monospace;
    font-size: .8rem; letter-spacing: .08em; padding: 14px 10px;
    cursor: pointer; transition: all .25s; text-align: center;
  }
  .select-btn:hover { border-color: rgba(0,150,255,.7); color: #fff; box-shadow: 0 0 15px rgba(0,100,255,.3); }
  .select-btn.active-A {
    background: rgba(0,40,120,.8); border-color: #3399ff;
    color: #fff; box-shadow: 0 0 20px rgba(0,120,255,.4);
  }
  .select-btn.active-B {
    background: rgba(100,0,0,.8); border-color: #ff4444;
    color: #fff; box-shadow: 0 0 20px rgba(255,50,50,.4);
  }
  .select-btn.active-mode {
    background: rgba(50,0,100,.8); border-color: #9900ff;
    color: #fff; box-shadow: 0 0 20px rgba(150,0,255,.4);
  }

  /* 연결 상태 */
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .status-card {
    background: rgba(0,10,25,.6); border-radius: 6px;
    border: 1px solid rgba(0,80,180,.2); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }

  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #333; flex-shrink: 0; transition: all .3s;
  }
  .status-dot.on  { background: #00ff88; box-shadow: 0 0 10px #00ff88; animation: blink .8s ease-in-out infinite alternate; }
  .status-dot.err { background: #ff4400; box-shadow: 0 0 10px #ff4400; }
  .status-dot.wait{ background: #ffaa00; box-shadow: 0 0 10px #ffaa00; animation: blink .8s ease-in-out infinite alternate; }

  @keyframes blink { from { opacity:.5 } to { opacity:1 } }

  .status-label { font-size: .9rem; color: rgba(180,220,255,.8); }
  .status-value { font-size: .85rem; color: rgba(120,180,255,.9); margin-left: auto; font-family: 'Orbitron', monospace; }

  /* 시작 버튼 */
  .btn-start {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, #006600, #004400);
    border: 2px solid rgba(0,255,100,.3); border-radius: 8px;
    color: #00ff88; font-family: 'Orbitron', monospace;
    font-size: 1.2rem; letter-spacing: .2em; font-weight: 700;
    cursor: not-allowed; opacity: .4; transition: all .3s;
    text-transform: uppercase;
  }
  .btn-start.ready {
    cursor: pointer; opacity: 1;
    box-shadow: 0 0 30px rgba(0,255,100,.3);
    animation: startPulse 1.5s ease-in-out infinite;
  }
  .btn-start.ready:hover {
    background: linear-gradient(135deg, #009900, #006600);
    box-shadow: 0 0 50px rgba(0,255,100,.6);
  }

  @keyframes startPulse {
    0%,100% { box-shadow: 0 0 30px rgba(0,255,100,.3); }
    50%      { box-shadow: 0 0 60px rgba(0,255,100,.6); }
  }

  /* SIM MODE 배지 */
  .sim-badge {
    background: rgba(255,150,0,.15); border: 1px solid rgba(255,150,0,.4);
    border-radius: 4px; padding: 6px 12px;
    color: #ffaa00; font-size: .8rem; letter-spacing: .1em;
    font-family: 'Orbitron', monospace;
  }

  /* 조이스틱 캘리브레이션 */
  .calib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .calib-group-title {
    font-family: 'Orbitron', monospace;
    font-size: .68rem; color: rgba(80,180,255,.65);
    letter-spacing: .12em; margin-bottom: 10px;
  }
  .calib-row {
    display: flex; align-items: center; gap: 10px;
    color: rgba(160,210,255,.85); font-size: .88rem;
    cursor: pointer; padding: 6px 8px; border-radius: 4px;
    transition: background .15s; user-select: none;
  }
  .calib-row:hover { background: rgba(0,100,255,.12); }
  .calib-row input[type="checkbox"] {
    width: 16px; height: 16px; cursor: pointer;
    accent-color: #0088ff; flex-shrink: 0;
  }
  .calib-status {
    font-size: .75rem; color: rgba(0,220,120,.7);
    margin-top: 8px; height: 16px; font-family: 'Orbitron', monospace;
    letter-spacing: .08em;
  }

  /* 감도 슬라이더 */
  .sens-row {
    display: flex; align-items: center; gap: 10px;
    color: rgba(160,210,255,.85); font-size: .88rem; padding: 6px 8px;
  }
  .sens-row input[type="range"] {
    flex: 1; accent-color: #0088ff; height: 4px; cursor: pointer;
  }
  .sens-val {
    font-family: 'Orbitron', monospace; font-size: .8rem;
    color: #60c0ff; width: 36px; text-align: right; flex-shrink: 0;
  }

  /* 포트 설정 */
  .port-select {
    background: rgba(0,10,30,.8);
    border: 1px solid rgba(0,120,255,.4); border-radius: 4px;
    color: #80d0ff; font-family: 'Orbitron', monospace; font-size: .9rem;
    padding: 8px 12px; outline: none; cursor: pointer;
    transition: border-color .2s; flex: 1; max-width: 140px;
  }
  .port-select:focus { border-color: rgba(0,180,255,.8); }
  .port-select option { background: #050e28; }

  /* 스캔라인 효과 */
  .scanline {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
  }

  /* 모드 설명 */
  .mode-desc { font-size: .82rem; color: rgba(120,160,220,.7); margin-top: 6px; line-height: 1.5; }

</style>
</head>
<body>
<div class="scanline"></div>

<div class="container">
  <!-- 타이틀 -->
  <div class="title-wrap">
    <div class="title-main">SENSOR WARS</div>
    <div class="title-sub">Arduino TPS · 2-Player Multiplayer</div>
  </div>

  <!-- 서버 연결 -->
  <div class="panel">
    <div class="panel-title">▶ 서버 접속</div>
    <div class="ip-row">
      <input class="ip-input" id="serverIP" type="text" placeholder="서버 IP (노트북A는 자동 설정)" value="localhost" />
      <button class="btn-connect" onclick="connectToServer()">접속</button>
    </div>
    <div id="simNotice" class="sim-badge" style="margin-top:10px; display:none;">
      🎮 SIM MODE — 키보드/마우스로 두 탭에서 각각 A, B 선택 후 플레이
    </div>
  </div>

  <!-- 입력 방식 선택 -->
  <div class="panel">
    <div class="panel-title">▶ 입력 방식</div>
    <div class="select-row">
      <button class="select-btn" id="inputArduino" onclick="selectInputMode('arduino')">
        🎮 아두이노 컨트롤러<br><small style="font-size:.65rem;opacity:.6">COM 포트 · 조이스틱 조작</small>
      </button>
      <button class="select-btn" id="inputSim" onclick="selectInputMode('sim')">
        ⌨ 키보드 / 마우스<br><small style="font-size:.65rem;opacity:.6">SIM MODE · 두 탭 사용</small>
      </button>
    </div>
  </div>

  <!-- COM 포트 설정 (아두이노 모드에서만 표시) -->
  <div class="panel" id="panelPort" style="display:none;">
    <div class="panel-title">▶ COM 포트 설정</div>
    <div class="ip-row" style="flex-wrap:wrap; gap:10px;">
      <select class="port-select" id="portSelect">
        <option value="">포트 목록 로딩중...</option>
      </select>
      <button class="btn-connect" onclick="refreshPorts()">🔄 새로고침</button>
      <button class="btn-connect" onclick="applyPort()">✔ 적용</button>
    </div>
    <div class="calib-status" id="portStatus"></div>
  </div>

  <!-- 조이스틱 캘리브레이션 (아두이노 모드 + 플레이어 선택 후 표시) -->
  <div class="panel" id="panelCalib" style="display:none;">
    <div class="panel-title">▶ 조이스틱 캘리브레이션</div>
    <div class="calib-grid">
      <div>
        <div class="calib-group-title">왼쪽 조이스틱 · 이동</div>
        <label class="calib-row"><input type="checkbox" id="calInvertLX" onchange="sendCalib()"> 전진/후진 반전</label>
        <label class="calib-row"><input type="checkbox" id="calInvertLY" onchange="sendCalib()"> 좌/우 이동 반전</label>
        <label class="calib-row"><input type="checkbox" id="calSwapLXY" onchange="sendCalib()"> 전후↔좌우 교환</label>
      </div>
      <div>
        <div class="calib-group-title">오른쪽 조이스틱 · 카메라</div>
        <label class="calib-row"><input type="checkbox" id="calInvertRX" onchange="sendCalib()"> 카메라 상/하 반전</label>
        <label class="calib-row"><input type="checkbox" id="calInvertRY" onchange="sendCalib()"> 카메라 좌/우 반전</label>
        <label class="calib-row"><input type="checkbox" id="calSwapRXY" onchange="sendCalib()"> 상하↔좌우 교환</label>
      </div>
    </div>
    <div class="calib-group-title" style="margin-top:12px;">카메라 감도</div>
    <div class="sens-row">
      <span style="font-size:.8rem;opacity:.6">느림</span>
      <input type="range" id="calSens" min="0.2" max="3.0" step="0.1" value="1.0" oninput="onLobbysens()">
      <span style="font-size:.8rem;opacity:.6">빠름</span>
      <span class="sens-val" id="calSensVal">1.0×</span>
    </div>
    <div class="calib-status" id="calibStatus"></div>
  </div>

  <!-- 플레이어 선택 -->
  <div class="panel">
    <div class="panel-title">▶ 플레이어 선택</div>
    <div class="select-row">
      <button class="select-btn" id="btnA" onclick="selectPlayer('A')" style="padding:22px 10px; font-size:.95rem;">
        🔵 PLAYER A<br><small style="font-size:.7rem;opacity:.6">파란팀</small>
      </button>
      <button class="select-btn" id="btnB" onclick="selectPlayer('B')" style="padding:22px 10px; font-size:.95rem;">
        🔴 PLAYER B<br><small style="font-size:.7rem;opacity:.6">빨간팀</small>
      </button>
    </div>
  </div>

  <!-- 게임 모드 선택 -->
  <div class="panel">
    <div class="panel-title">▶ 게임 모드</div>
    <div class="select-row">
      <button class="select-btn" id="modeDeatch" onclick="selectMode('deathmatch')">
        ⚔ 데스매치<br><small style="font-size:.65rem;opacity:.6">1v1 PvP · 10킬 승리</small>
      </button>
      <button class="select-btn" id="modeCoop" onclick="selectMode('coop')">
        🤝 협동 웨이브<br><small style="font-size:.65rem;opacity:.6">Co-op · 몬스터 섬멸</small>
      </button>
      <button class="select-btn" id="modePvpve" onclick="selectMode('pvpve')">
        💀 생존 배틀<br><small style="font-size:.65rem;opacity:.6">PvPvE · 3분 생존</small>
      </button>
    </div>
    <div id="modeDesc" class="mode-desc"></div>
  </div>

  <!-- 연결 상태 -->
  <div class="panel">
    <div class="panel-title">▶ 연결 상태</div>
    <div class="status-grid">
      <div class="status-card">
        <div class="status-dot" id="dotA"></div>
        <span class="status-label">Player A</span>
        <span class="status-value" id="statusA">대기중</span>
      </div>
      <div class="status-card">
        <div class="status-dot" id="dotB"></div>
        <span class="status-label">Player B</span>
        <span class="status-value" id="statusB">대기중</span>
      </div>
      <div class="status-card">
        <div class="status-dot" id="dotServer"></div>
        <span class="status-label">서버</span>
        <span class="status-value" id="statusServer">미연결</span>
      </div>
      <div class="status-card">
        <div class="status-dot" id="dotController"></div>
        <span class="status-label">컨트롤러</span>
        <span class="status-value" id="statusController">SIM MODE</span>
      </div>
    </div>
  </div>

  <!-- 시작 -->
  <button class="btn-start" id="btnStart" onclick="startGame()">
    ▶ 게임 시작
  </button>
</div>

<script>
let ws = null;
let myPlayer = null;
let selectedMode = 'deathmatch';
let playerStates = { A: false, B: false };
let serverConnected = false;
let arduinoMode = false;

const MODE_DESCS = {
  deathmatch: '제한시간 5분, 먼저 10킬 또는 시간 종료 시 킬 수 많은 쪽 승리. 사망 후 5초 리스폰.',
  coop:       '두 플레이어가 협력해 몬스터 웨이브를 막습니다. 5웨이브마다 강력한 보스 등장!',
  pvpve:      '플레이어 + 몬스터 동시 존재. 몬스터 처치 시 힐 드롭. 3분 안에 상대를 처치하세요.',
};

function connectToServer() {
  const ip = document.getElementById('serverIP').value.trim() || 'localhost';
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url = `${proto}://${ip}:3000`;

  if (ws) { ws.close(); ws = null; }

  ws = new WebSocket(url);
  setStatus('server', 'wait', '연결중...');

  ws.onopen = () => {
    serverConnected = true;
    setStatus('server', 'on', '연결됨 ✓');
    // 서버가 serverMode 메시지로 실제 모드를 알려줌
    document.getElementById('dotController').className = 'status-dot wait';
    document.getElementById('statusController').textContent = '확인중...';
    if (myPlayer) joinServer();
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    serverConnected = false;
    setStatus('server', 'err', '연결 끊김');
    setStatus('A', '', '대기중'); setStatus('B', '', '대기중');
    playerStates.A = false; playerStates.B = false;
    updateStartBtn();
  };

  ws.onerror = () => setStatus('server', 'err', '연결 실패');
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'welcome':
      myPlayer = msg.player;
      setStatus(myPlayer, 'on', '연결됨 ✓');
      playerStates[myPlayer] = true;
      updateStartBtn();
      break;
    case 'playerJoined':
      playerStates[msg.player] = true;
      setStatus(msg.player, 'on', '연결됨 ✓');
      updateStartBtn();
      break;
    case 'playerDisconnected':
      playerStates[msg.player] = false;
      setStatus(msg.player, '', '대기중');
      updateStartBtn();
      break;
    case 'arduinoStatus': {
      const ok   = msg.status === 'connected';
      const err  = msg.status === 'error';
      const disc = msg.status === 'disconnected';
      const dotCls = ok ? 'on' : (err ? 'err' : '');
      document.getElementById('dotController').className = `status-dot${dotCls ? ' '+dotCls : ''}`;
      document.getElementById('statusController').textContent =
        ok ? '연결됨 ✓' : (err ? '오류' : (disc ? '연결 끊김' : '대기중'));
      break;
    }
    case 'serverMode': {
      const isArduino = !msg.simMode;
      arduinoMode = isArduino;
      document.getElementById('inputArduino').className = 'select-btn' + (isArduino ? ' active-mode' : '');
      document.getElementById('inputSim').className     = 'select-btn' + (!isArduino ? ' active-mode' : '');
      document.getElementById('simNotice').style.display = isArduino ? 'none' : 'block';
      document.getElementById('panelPort').style.display  = isArduino ? '' : 'none';
      document.getElementById('panelCalib').style.display = (isArduino && myPlayer) ? '' : 'none';
      if (isArduino) {
        const dotCls = msg.arduinoConnected ? 'on' : 'wait';
        document.getElementById('dotController').className   = `status-dot ${dotCls}`;
        document.getElementById('statusController').textContent = msg.arduinoConnected ? '연결됨 ✓' : '연결 대기중';
        refreshPorts();
      } else {
        document.getElementById('dotController').className   = 'status-dot on';
        document.getElementById('statusController').textContent = 'SIM MODE';
      }
      break;
    }
    case 'portList': {
      const sel = document.getElementById('portSelect');
      const current = msg.current || '';
      sel.innerHTML = msg.ports.length
        ? msg.ports.map(p => `<option value="${p}"${p===current?' selected':''}>${p}</option>`).join('')
        : '<option value="">포트 없음</option>';
      document.getElementById('portStatus').textContent = msg.ports.length ? `${msg.ports.length}개 포트 발견` : '연결된 포트 없음';
      break;
    }
    case 'serialPortChanged': {
      document.getElementById('portStatus').textContent = `✓ Player ${msg.player} 포트 변경됨: ${msg.port}`;
      break;
    }
    case 'calibrationSaved': {
      const el = document.getElementById('calibStatus');
      el.textContent = '✓ 저장됨';
      setTimeout(() => { el.textContent = ''; }, 2000);
      break;
    }
    case 'modeChanged':
      selectedMode = msg.mode;
      highlightMode(msg.mode);
      break;
    case 'countdown':
    case 'gameStart':
      sessionStorage.setItem('swPlayer', myPlayer);
      sessionStorage.setItem('swMode', selectedMode);
      sessionStorage.setItem('swServerIP', document.getElementById('serverIP').value.trim());
      location.href = 'game.html';
      break;
  }
}

function selectPlayer(id) {
  myPlayer = id;
  document.getElementById('btnA').className = 'select-btn' + (id === 'A' ? ' active-A' : '');
  document.getElementById('btnB').className = 'select-btn' + (id === 'B' ? ' active-B' : '');
  document.getElementById('panelCalib').style.display = arduinoMode ? '' : 'none';
  loadCalib();
  if (serverConnected) joinServer();
}

function joinServer() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'join', player: myPlayer, mode: selectedMode }));
  // 저장된 캘리브레이션 전송
  const saved = localStorage.getItem(`swCalib_${myPlayer}`);
  if (saved) {
    try {
      ws.send(JSON.stringify({ type: 'setCalibration', calib: JSON.parse(saved) }));
    } catch(_) {}
  }
}

function selectMode(mode) {
  selectedMode = mode;
  highlightMode(mode);
  document.getElementById('modeDesc').textContent = MODE_DESCS[mode] || '';
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'setMode', mode }));
  }
}

function highlightMode(mode) {
  ['modeDeatch','modeCoop','modePvpve'].forEach(id => {
    document.getElementById(id).className = 'select-btn';
  });
  const map = { deathmatch:'modeDeatch', coop:'modeCoop', pvpve:'modePvpve' };
  if (map[mode]) document.getElementById(map[mode]).className = 'select-btn active-mode';
}

function startGame() {
  if (!serverConnected || !myPlayer) return;
  if (!playerStates.A || !playerStates.B) return;
  ws.send(JSON.stringify({ type: 'ready' }));
}

function updateStartBtn() {
  const btn = document.getElementById('btnStart');
  const canStart = serverConnected && myPlayer && playerStates.A && playerStates.B;
  btn.className = 'btn-start' + (canStart ? ' ready' : '');
}

function setStatus(id, dotClass, text) {
  const dotId = { A:'dotA', B:'dotB', server:'dotServer' }[id] || ('dot'+id);
  const valId = { A:'statusA', B:'statusB', server:'statusServer' }[id] || ('status'+id);
  const dot = document.getElementById(dotId);
  const val = document.getElementById(valId);
  if (dot) dot.className = `status-dot${dotClass ? ' '+dotClass : ''}`;
  if (val) val.textContent = text;
}

function selectInputMode(mode) {
  const isArduino = mode === 'arduino';
  document.getElementById('inputArduino').className = 'select-btn' + (isArduino ? ' active-mode' : '');
  document.getElementById('inputSim').className     = 'select-btn' + (!isArduino ? ' active-mode' : '');
  document.getElementById('simNotice').style.display = isArduino ? 'none' : 'block';
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'setInputMode', mode }));
  }
}

// ─── 조이스틱 캘리브레이션 ────────────────────────────────────────────────
function onLobbysens() {
  const v = parseFloat(document.getElementById('calSens').value).toFixed(1);
  document.getElementById('calSensVal').textContent = v + '×';
  sendCalib();
}

function sendCalib() {
  if (!ws || ws.readyState !== WebSocket.OPEN || !myPlayer) return;
  const calib = {
    invertLX:    document.getElementById('calInvertLX').checked,
    invertLY:    document.getElementById('calInvertLY').checked,
    invertRX:    document.getElementById('calInvertRX').checked,
    invertRY:    document.getElementById('calInvertRY').checked,
    swapLXY:     document.getElementById('calSwapLXY').checked,
    swapRXY:     document.getElementById('calSwapRXY').checked,
    sensitivity: parseFloat(document.getElementById('calSens').value),
  };
  ws.send(JSON.stringify({ type: 'setCalibration', player: myPlayer, calib }));
  localStorage.setItem(`swCalib_${myPlayer}`, JSON.stringify(calib));
}

function loadCalib() {
  if (!myPlayer) return;
  const saved = localStorage.getItem(`swCalib_${myPlayer}`);
  if (!saved) return;
  try {
    const c = JSON.parse(saved);
    document.getElementById('calInvertLX').checked = !!c.invertLX;
    document.getElementById('calInvertLY').checked = !!c.invertLY;
    document.getElementById('calInvertRX').checked = !!c.invertRX;
    document.getElementById('calInvertRY').checked = !!c.invertRY;
    document.getElementById('calSwapLXY').checked  = !!c.swapLXY;
    document.getElementById('calSwapRXY').checked  = !!c.swapRXY;
    if (c.sensitivity != null) {
      document.getElementById('calSens').value = c.sensitivity;
      document.getElementById('calSensVal').textContent = parseFloat(c.sensitivity).toFixed(1) + '×';
    }
  } catch(_) {}
}

// ─── COM 포트 설정 ────────────────────────────────────────────────────────
function refreshPorts() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'listPorts' }));
  document.getElementById('portStatus').textContent = '포트 목록 조회 중...';
}

function applyPort() {
  const port = document.getElementById('portSelect').value;
  if (!port) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'setSerialPort', player: 'A', port }));
  document.getElementById('portStatus').textContent = `포트 변경 중: ${port}...`;
}

// 초기화
window.onload = () => {
  selectMode('deathmatch');
  connectToServer();
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    document.getElementById('serverIP').value = 'localhost';
  } else {
    document.getElementById('serverIP').value = location.hostname;
  }
};
</script>
